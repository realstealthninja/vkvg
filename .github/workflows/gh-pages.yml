name: Doxygen CI

on:
  push:
    branches: [master]

jobs:
  build:
    runs-on: ubuntu-slim
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
      - name: Install requirements
        run: |
          wget -qO- https://packages.lunarg.com/lunarg-signing-key-pub.asc | sudo tee /etc/apt/trusted.gpg.d/lunarg.asc
          sudo wget -qO /etc/apt/sources.list.d/lunarg-vulkan-noble.list http://packages.lunarg.com/vulkan/lunarg-vulkan-noble.list
          sudo add-apt-repository universe
          sudo apt update
          sudo apt install graphviz cmake doxygen libvulkan1 vulkan-sdk
      - name: configure
        run: cmake -DVKVG_BUILD_DOCS=ON -B ./build -S .
      - name: build
        run: cmake --build build
      - name: gh-pages
        uses: actions/checkout@v4
        with:
          ref: "gh-pages"
          clean: false
      - name: Move & Commit files
        run: |
          git config --global user.name "$GITHUB_ACTOR"
          git config --global user.email "$GITHUB_ACTOR@users.noreply.github.com"
          git remote set-url origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/$GITHUB_REPOSITORY
          rm -rf d* && rm *.html && rm *.svg && rm *.map && rm *.md5 && rm *.png && rm *.js
          git add .
          cp -rp ./build/html/* . && rm -rf ./build && ls -lah
          git add .
          git commit -m "Documentation for $GITHUB_SHA" ||  true
          git push --force || true
